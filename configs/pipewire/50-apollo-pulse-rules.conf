# Force browsers to match Apollo ALSA quantum.
# Without this, Firefox/Chromium request quantum 900/1200 which causes
# choppy audio when capturing from Apollo virtual sources.
# Deploy to: /etc/pipewire/pipewire-pulse.conf.d/50-apollo-pulse-rules.conf

pulse.rules = [
    {
        matches = [
            { application.process.binary = "firefox" }
            { application.process.binary = "firefox-esr" }
            { application.process.binary = "chromium-browser" }
            { application.process.binary = "chromium" }
            { application.process.binary = "google-chrome" }
            { application.process.binary = "Discord" }
            { application.process.binary = "discord" }
            { application.process.binary = "electron" }
        ]
        actions = {
            update-props = {
                pulse.min.req     = 512/48000
                pulse.min.quantum = 512/48000
            }
        }
    }
]
